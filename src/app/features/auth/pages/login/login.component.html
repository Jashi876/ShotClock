<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <span class="logo-iconlarge">SC</span>
      <h1>Welcome Back</h1>
      <p>Log in to manage your production schedule</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" formControlName="email" placeholder="name@company.com"
               [class.invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
        <div class="error-msg" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Please enter a valid email
        </div>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label for="password">Password</label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <input type="password" id="password" formControlName="password" placeholder="••••••••"
               [class.invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
      </div>

      <div class="error-msg global-error" *ngIf="error">{{ error }}</div>

      <button type="submit" class="btn-submit" [disabled]="loginForm.invalid || loading">
        <span *ngIf="!loading">Log In</span>
        <span *ngIf="loading" class="loader"></span>
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a routerLink="/auth/register">Sign up for free</a>
    </div>
  </div>
</div>
