<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <span class="logo-iconlarge">SC</span>
      <h1>Create Account</h1>
      <p>Start your free trial search today</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="name-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" formControlName="firstName" placeholder="Jane">
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" formControlName="lastName" placeholder="Doe">
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" formControlName="email" placeholder="jane@example.com">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" formControlName="password" placeholder="At least 6 characters">
      </div>

      <button type="submit" class="btn-submit" [disabled]="registerForm.invalid || loading">
        <span *ngIf="!loading">Sign Up</span>
        <span *ngIf="loading" class="loader"></span>
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a routerLink="/auth/login">Log in</a>
    </div>
  </div>
</div>
