<div class="contact-container">
  <div class="contact-card">
    <div class="contact-header">
      <h1>Contact Us</h1>
      <p>Have questions? We are here to help you get the most out of ShotClock.</p>
    </div>

    <div *ngIf="submitted" class="success-message">
      <span class="success-icon">[v]</span>
      <h2>Message Sent!</h2>
      <p>Thank you for reaching out. Our team will get back to you shortly.</p>
      <button class="btn-primary" (click)="submitted = false">Send Another Message</button>
    </div>

    <form *ngIf="!submitted" [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="contact-form">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" formControlName="name" placeholder="Your name">
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" formControlName="email" placeholder="you@company.com">
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" formControlName="subject" placeholder="How can we help?">
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" formControlName="message" rows="5" placeholder="Tell us more about your needs..."></textarea>
      </div>

      <button type="submit" class="btn-submit" [disabled]="contactForm.invalid">
        Send Message
      </button>
    </form>
  </div>
</div>
