<div class="page-head">
  <h1>Create New Project</h1>
</div>

<div class="content-card">
  <form [formGroup]="projectForm" (ngSubmit)="onSubmit()" class="form-grid">
    <div class="form-group full-width">
      <label for="name">Project Name</label>
      <input type="text" id="name" formControlName="name" placeholder="Enter project title...">
    </div>

    <div class="form-group">
      <label for="type">Project Type</label>
      <select id="type" formControlName="type">
        <option value="" disabled selected>Select a type</option>
        <option *ngFor="let type of projectTypes" [value]="type">{{ type }}</option>
      </select>
    </div>

    <div class="form-group">
      <label for="startDate">Target Start Date</label>
      <input type="date" id="startDate" formControlName="startDate">
    </div>

    <div class="form-group full-width">
      <label for="description">Project Description</label>
      <textarea id="description" formControlName="description" rows="4" placeholder="Briefly describe the production..."></textarea>
    </div>

    <div class="form-actions full-width">
      <button type="button" class="btn-secondary" routerLink="/projects">Cancel</button>
      <button type="submit" class="btn-primary" [disabled]="projectForm.invalid || loading">
        {{ loading ? 'Creating...' : 'Create Project' }}
      </button>
    </div>
  </form>
</div>
