<div class="page-head">
  <h1>Projects</h1>
  <button class="btn-primary" routerLink="create">New Project</button>
</div>

<div class="project-grid" *ngIf="!loading">
  <div class="project-card" *ngFor="let project of projects" [routerLink]="[project.id]">
    <div class="project-thumb">
      <span class="type-badge">{{ project.type }}</span>
    </div>
    <div class="project-body">
      <h3>{{ project.name }}</h3>
      <p>{{ project.description }}</p>
      <div class="project-footer">
        <span class="status" [class]="project.status.toLowerCase().replace(' ', '-')">
          {{ project.status }}
        </span>
        <span class="date">{{ project.startDate }}</span>
      </div>
    </div>
  </div>
</div>

<div class="loader-container" *ngIf="loading">
  <div class="spinner"></div>
</div>
